name: Release

# Manually triggered. Builds APKs and creates a GitHub Release with artifacts.
# Usage: Actions → Release → Run workflow → enter a version string (e.g. 2026-04-27)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2026-04-27 or v1.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release?"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build and Release ${{ inputs.version }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build APKs
        run: ./gradlew assembleDebug

      - name: Build companion package
        run: ./build_termux_package

      - name: Extract changelog excerpt for release notes
        id: changelog
        run: |
          # Pull the [Unreleased] section from CHANGELOG.md as release notes
          awk '/^## \[Unreleased\]/{found=1; next} found && /^## \[/{exit} found{print}' \
            CHANGELOG.md > /tmp/release_notes.txt

          if [ ! -s /tmp/release_notes.txt ]; then
            echo "Release ${{ inputs.version }}" > /tmp/release_notes.txt
          fi

          echo "Release notes:"
          cat /tmp/release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.version }}"
          name: "Visionary Termux ${{ inputs.version }}"
          body_path: /tmp/release_notes.txt
          draft: false
          prerelease: ${{ inputs.prerelease }}
          files: |
            ./app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
            ./app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk
            ./app/build/outputs/apk/debug/app-x86_64-debug.apk
            ./app/build/outputs/apk/debug/app-x86-debug.apk
            ./app/build/outputs/apk/debug/app-universal-debug.apk
            ./app/build/outputs/apk/debug/termux-x11-*-all.deb
            ./app/build/outputs/apk/debug/termux-x11-*-any.pkg.tar.xz
