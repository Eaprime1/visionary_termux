name: PR Checks

# Runs on every pull request targeting master.
# Gates: build verification, duplicate-file detection, license scan.

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write   # needed to post review comments

jobs:
  # ------------------------------------------------------------------
  # 1. Build — reuse the same Java/Gradle stack as debug_build.yml
  # ------------------------------------------------------------------
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # full history needed for diff checks

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Build companion package
        run: ./build_termux_package

  # ------------------------------------------------------------------
  # 2. Duplicate Detection — compare PR files against master
  # ------------------------------------------------------------------
  duplicate-check:
    name: Duplicate File Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run duplicate checker
        id: dupes
        run: |
          bash .github/scripts/check-duplicates.sh \
            --base origin/master \
            --head HEAD \
            --output duplicates.txt
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          cat duplicates.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post duplicate report as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.dupes.outputs.report }}`;
            if (!report.trim() || report.includes('No duplicates found')) {
              console.log('No duplicates — skipping comment.');
              return;
            }
            const body = [
              '## Duplicate File Report',
              '',
              'The following files in this PR appear to duplicate content already in `master`.',
              'Please review and resolve before merging.',
              '',
              '```',
              report,
              '```',
              '',
              '_Generated by `.github/workflows/pr-checks.yml`_'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  # ------------------------------------------------------------------
  # 3. Shell Script Lint — catch common bash errors in new scripts
  # ------------------------------------------------------------------
  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint changed shell scripts
        run: |
          # Find .sh files and shell scripts (no extension) changed in this PR
          git diff --name-only origin/master...HEAD | \
            while read -r f; do
              [ -f "$f" ] || continue
              # check by shebang if no .sh extension
              if [[ "$f" == *.sh ]] || head -1 "$f" 2>/dev/null | grep -qE '^#!(.*)(bash|sh)'; then
                echo "Checking: $f"
                shellcheck -S warning "$f" || true
              fi
            done

  # ------------------------------------------------------------------
  # 4. Integration Branch Hygiene — remind about naming conventions
  # ------------------------------------------------------------------
  branch-hygiene:
    name: Branch Naming Check
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "PR branch: $BRANCH"

          # Warn (don't fail) if integration branches don't follow convention
          if echo "$BRANCH" | grep -qiE '^(integration|import|merge)/' ; then
            echo "PASS: Integration branch naming looks good."
          elif echo "$BRANCH" | grep -qE '^(feat|fix|docs|chore|refactor)/' ; then
            echo "PASS: Standard feature branch naming."
          else
            echo "WARN: Branch name '$BRANCH' doesn't follow a recognised convention."
            echo "Recommended prefixes:  integration/<repo-name>  |  feat/<topic>  |  fix/<topic>"
            echo "This is a warning only — PR is not blocked."
          fi
