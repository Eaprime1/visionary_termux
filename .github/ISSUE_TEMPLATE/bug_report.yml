name: "Bug report"
description: "Create a report to help us improve"
title: "[Bug]: "
labels: [untriaged, "bug report"]
body:
  - type: markdown
    attributes:
      value: |
        This is the bug tracker for **Visionary Termux** — a curated power-user platform built on Termux.

        **Before filing:**
        - If your bug is in the upstream Termux:X11 app itself (rendering, input handling, the Android activity), please report it at [termux/termux-x11](https://github.com/termux/termux-x11/issues) instead.
        - For general Termux questions, use [Termux Packages Discussions](https://github.com/termux/termux-packages/discussions) or the [Termux Discord](https://discord.gg/termux-641256914684084234).
        - Use search to check whether your issue has already been reported.

        Android versions below 8.x are not supported.

        ### Logs
        If you need to obtain logs from the `com.termux.x11` application,
        set the `TERMUX_X11_DEBUG` environment variable to 1:
        `TERMUX_X11_DEBUG=1 termux-x11 :0`

  - type: textarea
    attributes:
      label: Problem description
      description: |
        A clear and concise description of what the problem is. You may attach the logs, screenshots, screen video recording and whatever else that will help to understand the issue.

        Issues without proper description will be closed without solution.
    validations:
      required: true
  - type: textarea
    attributes:
      label: What steps will reproduce the bug?
    validations:
      required: true
  - type: textarea
    attributes:
      label: What is the expected behavior?
